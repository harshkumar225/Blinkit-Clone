<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <div class="login-page">
        <div class="login">
            <img src="./Images/blinkit-logo-png_seeklogo-438944.png" alt="">
            <h2>India's Last Minute app</h2>
            <p>Log in or Sign up</p>

            <form>
             <input type="number" class="number" placeholder="Enter mobile number">

             <button style="display: block; margin-top: 20px;">Continue</button>

            </form>
        </div>
    </div>


    <style>
        .login-page{
            height: 300px;
            width: 400px;
            background-color: white;
            margin: 0 auto;
            margin-top: 15%;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            
            
            
        }

        .login input{
            width: 100%;
            height: 35px;
            border-radius: 10px;
            border: none;
            border: 1px solid rgba(0, 0, 0, 0.545);
            padding-left: 10px;
            
        }

        button{
            width: 100%;
            height: 40px;
            border-radius: 10px;
            background-color: rgba(0, 0, 0, 0.359);
            color:white;
            font-weight: 600;
            
        }

        button:hover{
            cursor: pointer;
        }

        .login img{
            height: 60px;
            width: 60px;
        }
        
            .login{
             text-align: center;
            
        }

        body{
            background-color: rgba(0, 0, 0, 0.316);
            
        }


        @media (max-width:768px) {
            .login-page{
                width: 100%;
                max-width: 350px;
                display: flex;
                justify-content: center;
                align-items: center;

            }

            body{
                display: flex;
                justify-content: center;
                align-items: center;
            }
        }

        @media (max-width:480px) {
            .login-page{
               max-width: 80%;
               padding: 20px;
               margin-top: 60%;
               
               
               
            }
           
        
        }
    </style>

    <script src="script.js"></script>
</body>
</html>
